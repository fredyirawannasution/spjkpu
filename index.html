<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#9a1f2d">
  <meta name="description" content="PWA wrapper untuk SPJ KPU Labuhanbatu Utara berbasis Google Apps Script.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SPJ KPU Labura">
  <title>SPJ KPU Labuhanbatu Utara</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="icon" href="/assets/icons/icon-192.png">
  <script src="/config.js"></script>
  <style>
    :root{--primary:#9a1f2d;--dark:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--dark)}
    body{overflow:hidden}
    .shell{height:100%;display:grid;grid-template-rows:auto 1fr;background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.92);backdrop-filter:blur(12px);padding-top:max(10px,env(safe-area-inset-top))}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#7e1521);color:#fff;display:grid;place-items:center;font-weight:800;box-shadow:0 10px 24px rgba(154,31,45,.20);flex:0 0 auto}
    .title{min-width:0}.title b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title span{display:block;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .actions{display:flex;align-items:center;gap:8px}.btn{height:38px;padding:0 12px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--dark);font-weight:700;cursor:pointer}.btn.primary{border-color:transparent;background:linear-gradient(135deg,var(--primary),#7e1521);color:#fff}
    .frame-wrap{position:relative;min-height:0}.frame{width:100%;height:100%;border:0;background:#fff}.notice{position:absolute;inset:0;display:none;place-items:center;padding:20px;background:linear-gradient(135deg,#0f172a,#17233c);color:#fff;text-align:center}.card{width:min(560px,100%);padding:24px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);box-shadow:0 28px 80px rgba(0,0,0,.25)}.card h1{margin:0 0 10px;font-size:24px}.card p{margin:0 0 16px;color:rgba(255,255,255,.78);line-height:1.6}.code{display:block;text-align:left;white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.22);padding:12px;border-radius:14px;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}
    @media(max-width:640px){.topbar{padding-left:10px;padding-right:10px}.title span{display:none}.btn{padding:0 10px}.hide-mobile{display:none}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark">SPJ</div>
        <div class="title"><b>SPJ KPU Labura</b><span>PWA GitHub / Cloudflare untuk Apps Script</span></div>
      </div>
      <div class="actions">
        <button class="btn hide-mobile" id="installBtn" hidden>Install</button>
        <button class="btn" onclick="reloadFrame()">Refresh</button>
        <button class="btn primary" onclick="openAppsScript()">Buka</button>
      </div>
    </header>
    <main class="frame-wrap">
      <iframe id="appFrame" class="frame" title="SPJ Apps Script"></iframe>
      <div id="setupNotice" class="notice">
        <div class="card">
          <h1>URL Apps Script belum diatur</h1>
          <p>Edit file <b>config.js</b>, lalu isi <b>APPS_SCRIPT_URL</b> dengan URL deployment Web App Apps Script.</p>
          <span class="code">window.SPJ_APP_CONFIG = {
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycb.../exec'
};</span>
        </div>
      </div>
    </main>
  </div>
  <script>
    const cfg = window.SPJ_APP_CONFIG || {};
    const url = String(cfg.APPS_SCRIPT_URL || '').trim();
    const frame = document.getElementById('appFrame');
    const notice = document.getElementById('setupNotice');

    function validUrl(value){ return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(\?.*)?$/.test(value); }
    function loadApp(){
      if(!validUrl(url)){
        notice.style.display = 'grid';
        frame.removeAttribute('src');
        return;
      }
      frame.src = url;
    }
    function reloadFrame(){ if(frame.src) frame.src = frame.src; }
    function openAppsScript(){ if(validUrl(url)) window.open(url, '_blank', 'noopener,noreferrer'); }

    if('serviceWorker' in navigator){
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(console.error));
    }

    let deferredPrompt = null;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.hidden = false;
    });
    installBtn.addEventListener('click', async () => {
      if(!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.hidden = true;
    });

    loadApp();
  </script>
</body>
</html>
